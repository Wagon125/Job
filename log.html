<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Login Form</title>
    <link rel="stylesheet" href="log.css">
</head>
<body>
    <div class="login_content">

        <!-- Left side -->
        <div class="form-left">
            <div class="overlay-text">
                <h2>Welcome!</h2>
                <p>Login to your account to continue</p>
            </div>
        </div>

        <!-- Right side -->
        <div class="form-right">
            <h1>Login</h1>

            <form action="/login" method="post" enctype="multipart/form-data">
                <input type="email/phone" placeholder="Email" id="mail" required>
                <input type="password" placeholder="Password" id="password" required>

                <div class="log">
                    <a href="https://www.facebook.com" class="social-btn facebook-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="white">
                            <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.99 3.66 9.12 8.44 9.88v-6.99h-2.54v-2.89h2.54V9.34c0-2.5 1.49-3.89 3.77-3.89 1.09 0 2.23.2 2.23.2v2.45h-1.25c-1.23 0-1.61.77-1.61 1.56v1.87h2.74l-.44 2.89h-2.3v6.99C18.34 21.12 22 16.99 22 12z"/>
                        </svg>
                        Facebook
                    </a>

                    <a href="https://www.instagram.com" class="social-btn instagram-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="white">
                            <path d="M7.75 2h8.5C19.55 2 22 4.45 22 7.75v8.5C22 19.55 19.55 22 16.25 22h-8.5C4.45 22 2 19.55 2 16.25v-8.5C2 4.45 4.45 2 7.75 2zm0 2C5.68 4 4 5.68 4 7.75v8.5C4 18.32 5.68 20 7.75 20h8.5C18.32 20 20 18.32 20 16.25v-8.5C20 5.68 18.32 4 16.25 4h-8.5zm8.5 1.5a1 1 0 110 2 1 1 0 010-2zM12 7a5 5 0 110 10 5 5 0 010-10zm0 2a3 3 0 100 6 3 3 0 000-6z"/>
                        </svg>
                        Instagram
                    </a>
                </div>
                <br>

                <button type="submit onclick="window.location.href='dashboard.html' class="sign">Connect to your Account</button>
            </form>
        </div>

    </div>
</body>
</html>
